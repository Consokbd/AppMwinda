services:
  - type: web
    name: appmwinda
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate && python manage.py create_admin --username admin --password Admin@123456 && gunicorn AppMwinda.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: appmwinda.onrender.com,localhost,127.0.0.1
      - key: DATABASE_URL
        fromDatabase:
          name: appmwinda-db
          property: connectionString

databases:
  - name: appmwinda-db
    databaseName: appmwinda
    user: appmwinda_user
