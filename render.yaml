services:
  - type: web
    name: appmwinda
    runtime: python3
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    deployCommand: "python manage.py migrate"
    startCommand: "gunicorn AppMwinda.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: appmwinda.onrender.com,localhost,127.0.0.1
    databases:
      - name: appmwinda-db
        databaseName: appmwinda
        user: appmwinda_user